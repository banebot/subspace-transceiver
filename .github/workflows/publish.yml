name: Publish to npm

on:
  release:
    types: [created]

jobs:
  # ── Build Rust engine binaries (matrix) ─────────────────────────────────────
  build-engine:
    name: Build Engine (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-13
            platform: macos-x64
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine

      - name: Install musl tools (Linux)
        if: matrix.platform == 'linux-x64'
        run: sudo apt-get install -y musl-tools

      - name: Build engine binary
        working-directory: packages/engine
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload engine binary
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.platform }}
          path: packages/engine/target/${{ matrix.target }}/release/subspace-engine
          retention-days: 1

  # ── Build CLI binaries (using bun) ──────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: macos-arm64
            bun_target: bun-darwin-arm64
          - platform: macos-x64
            bun_target: bun-darwin-x64
          - platform: linux-x64
            bun_target: bun-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Compile CLI binary
        run: |
          bun build --compile \
            --target=${{ matrix.bun_target }} \
            packages/cli/binary-entry.ts \
            --outfile bin/subspace-${{ matrix.platform }}

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: bin/subspace-${{ matrix.platform }}
          retention-days: 1

  # ── Assemble release bundles ─────────────────────────────────────────────────
  assemble:
    name: Assemble Release (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [build-engine, build-cli]
    strategy:
      matrix:
        platform: [macos-arm64, macos-x64, linux-x64]

    steps:
      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: release/${{ matrix.platform }}

      - name: Download engine binary
        uses: actions/download-artifact@v4
        with:
          name: engine-${{ matrix.platform }}
          path: release/${{ matrix.platform }}

      - name: Rename engine binary
        run: mv release/${{ matrix.platform }}/subspace-engine release/${{ matrix.platform }}/subspace-engine

      - name: Make executables
        run: chmod +x release/${{ matrix.platform }}/subspace-* || true

      - name: Create tarball
        run: |
          tar -czf subspace-${{ matrix.platform }}.tar.gz \
            -C release/${{ matrix.platform }} .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: subspace-${{ matrix.platform }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish npm packages ─────────────────────────────────────────────────────
  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [build-engine, build-cli]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish workspace packages
        run: npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
