name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Fast E2E: runs on every PR and push ──────────────────────────────────────
  e2e-localhost:
    name: E2E (localhost, no Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run E2E tests (localhost mode)
        run: npm run test:e2e
        env:
          E2E_MODE: localhost
          # Fast timers for CI — avoids waiting for 60s manifest intervals
          SUBSPACE_MANIFEST_INTERVAL_MS: 5000
          SUBSPACE_GC_INTERVAL_MS: 2000
          # No public internet — mDNS only
          SUBSPACE_BOOTSTRAP_ADDRS: ""
          SUBSPACE_RELAY_ADDRS: ""
          # Verbose output for debugging failures
          DEBUG: "libp2p:*"

  # ── Docker E2E: runs only on main branch merges ───────────────────────────────
  e2e-docker:
    name: E2E (Docker Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Only run on merges to main (Docker tests are slower, we don't need them on every PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests via Docker Compose
        run: npm run test:e2e:docker
        timeout-minutes: 20

      - name: Collect Docker logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose.yml logs --no-color

  # ── Performance benchmarks: runs only on main branch merges ──────────────────
  e2e-perf:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run performance benchmarks
        run: npm run test:e2e:perf
        env:
          E2E_MODE: localhost
          SUBSPACE_BOOTSTRAP_ADDRS: ""
          SUBSPACE_RELAY_ADDRS: ""
          SUBSPACE_MANIFEST_INTERVAL_MS: 5000
          # Compare against saved baselines if they exist
          PERF_BASELINE: compare

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results-${{ github.sha }}
          path: e2e/perf-baselines.json
          if-no-files-found: ignore
